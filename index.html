<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Adventure: Greater, Less, or Equal</title>
    <style>
        :root {
            --bg-color: #FFF9C4;
            --card-color: #FFFFFF;
            --blue-btn: #38B6FF;
            --orange-btn: #FF914D;
            --green-btn: #7ED957;
            --text-dark: #333333;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background-color: #FFDE59;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            background-color: var(--card-color);
            width: 95%;
            max-width: 800px;
            height: 90vh;
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 15px 0px rgba(0,0,0,0.1);
            text-align: center;
            border: 8px solid #FFBD59;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Progress Bar */
        .header-area { width: 100%; }
        .progress-container {
            width: 100%;
            background-color: #eee;
            border-radius: 20px;
            height: 30px;
            border: 3px solid var(--text-dark);
            overflow: hidden;
            margin-bottom: 5px;
            position: relative;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--green-btn);
            transition: width 0.3s;
        }
        #progress-text {
            position: absolute;
            width: 100%;
            top: 4px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .topic-heading {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 10px 0;
            color: #FF5757;
        }

        /* Screen Visibility */
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; }
        .active { display: flex; }

        /* Cover Page */
        .symbol-intro {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin: 20px 0;
        }
        .symbol-card {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 20px;
            border: 3px solid var(--text-dark);
            width: 25%;
        }
        .symbol-card h2 { font-size: 4rem; margin: 0; color: #5271FF; }

        .play-btn {
            background-color: #FF5757;
            color: white;
            font-size: 2.5rem;
            padding: 20px 60px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 0 #C44545;
        }
        .play-btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #C44545; }

        /* Quiz UI */
        .question-box {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 30px 0;
        }
        .num-circle {
            background: #FFF5CC;
            border: 5px solid var(--text-dark);
            border-radius: 25px;
            width: 140px;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            font-weight: bold;
        }
        .symbol-placeholder {
            font-size: 6rem;
            color: #FF5757;
            width: 100px;
            height: 100px;
            line-height: 100px;
            border-bottom: 8px dashed #ccc;
        }

        .choices {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .btn-choice {
            width: 120px;
            height: 120px;
            font-size: 4rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            color: white;
            box-shadow: 0 10px 0 rgba(0,0,0,0.2);
        }
        .gt { background-color: var(--blue-btn); }
        .lt { background-color: var(--orange-btn); }
        .eq { background-color: var(--green-btn); }

        .nav-btns {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: auto;
        }
        .nav-btn {
            padding: 10px 25px;
            font-size: 1.2rem;
            border-radius: 15px;
            border: 3px solid var(--text-dark);
            background: white;
            cursor: pointer;
            font-weight: bold;
        }

        /* Star Rating */
        .stars { font-size: 5rem; color: #FFBD59; margin: 20px 0; }
        .result-img { width: 120px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="quiz-header" style="display: none;" class="header-area">
        <div class="progress-container">
            <div id="progress-bar"></div>
            <div id="progress-text">0 / 30 Done</div>
        </div>
        <div class="topic-heading">Put &lt; , &gt; or =</div>
    </div>

    <div id="cover-screen" class="screen active">
        <h1 style="font-size: 3rem; color: #5271FF;">Number Adventure!</h1>
        <div class="symbol-intro">
            <div class="symbol-card"><h2>&gt;</h2><p>Greater Than</p></div>
            <div class="symbol-card"><h2>&lt;</h2><p>Less Than</p></div>
            <div class="symbol-card"><h2>=</h2><p>Equal To</p></div>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/3071/3071161.png" style="width:100px; margin-bottom:20px;" alt="Owl">
        <button class="play-btn" onclick="startQuiz()">Let's Play! 🚀</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="question-box">
            <div id="num1" class="num-circle">0</div>
            <div id="symbol-display" class="symbol-placeholder">?</div>
            <div id="num2" class="num-circle">0</div>
        </div>

        <div class="choices">
            <button class="btn-choice gt" onclick="checkChoice('>')">&gt;</button>
            <button class="btn-choice lt" onclick="checkChoice('<')">&lt;</button>
            <button class="btn-choice eq" onclick="checkChoice('=')">=</button>
        </div>

        <div class="nav-btns">
            <button class="nav-btn" onclick="goBack()">⬅ Back</button>
            <button class="nav-btn" onclick="finishEarly()">End Quiz 🛑</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h1 style="font-size: 3rem;">All Done!</h1>
        <div id="star-display" class="stars"></div>
        <h2 id="final-score" style="font-size: 2rem;">Score: 0/30</h2>
        <button class="play-btn" onclick="location.reload()">Play Again 🔄</button>
    </div>
</div>

<script>
    // Audio feedback logic
    const synth = window.speechSynthesis;
    const feedbackGood = ["Well done!", "Fantastic!", "Brilliant!", "Superb!", "Excellent!"];

    const questions = [
        {a: 15, b: 10, ans: '>'}, {a: 22, b: 35, ans: '<'}, {a: 50, b: 50, ans: '='},
        {a: 9, b: 5, ans: '>'}, {a: 11, b: 14, ans: '<'}, {a: 33, b: 33, ans: '='},
        {a: 40, b: 20, ans: '>'}, {a: 1, b: 10, ans: '<'}, {a: 5, b: 5, ans: '='},
        {a: 99, b: 10, ans: '>'}, {a: 18, b: 81, ans: '<'}, {a: 100, b: 100, ans: '='},
        {a: 34, b: 10, ans: '>'}, {a: 2, b: 3, ans: '<'}, {a: 0, b: 0, ans: '='},
        {a: 75, b: 57, ans: '>'}, {a: 6, b: 60, ans: '<'}, {a: 44, b: 44, ans: '='},
        {a: 13, b: 3, ans: '>'}, {a: 19, b: 91, ans: '<'}, {a: 82, b: 82, ans: '='},
        {a: 54, b: 45, ans: '>'}, {a: 7, b: 70, ans: '<'}, {a: 12, b: 12, ans: '='},
        {a: 8, b: 4, ans: '>'}, {a: 25, b: 52, ans: '<'}, {a: 90, b: 90, ans: '='},
        {a: 14, b: 11, ans: '>'}, {a: 3, b: 30, ans: '<'}, {a: 66, b: 66, ans: '='}
    ];

    let currentIdx = 0;
    let score = 0;

    function speak(text) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.pitch = 1.2;
        utter.rate = 1;
        synth.speak(utter);
    }

    function startQuiz() {
        speak("Let's Play! Pick the right symbol.");
        document.getElementById('cover-screen').classList.remove('active');
        document.getElementById('quiz-screen').classList.add('active');
        document.getElementById('quiz-header').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        const q = questions[currentIdx];
        document.getElementById('num1').innerText = q.a;
        document.getElementById('num2').innerText = q.b;
        document.getElementById('symbol-display').innerText = "?";
        
        // Update Progress
        document.getElementById('progress-bar').style.width = (currentIdx / 30 * 100) + "%";
        document.getElementById('progress-text').innerText = `${currentIdx} / 30 Done`;
    }

    function checkChoice(val) {
        const q = questions[currentIdx];
        const display = document.getElementById('symbol-display');
        display.innerText = val;

        if (val === q.ans) {
            score++;
            const msg = feedbackGood[Math.floor(Math.random() * feedbackGood.length)];
            speak(msg);
            
            setTimeout(() => {
                if (currentIdx < questions.length - 1) {
                    currentIdx++;
                    loadQuestion();
                } else {
                    showResults();
                }
            }, 1000);
        } else {
            speak("Please try again");
            // Question remains the same, wait for correct answer
        }
    }

    function goBack() {
        if (currentIdx > 0) {
            currentIdx--;
            loadQuestion();
        }
    }

    function finishEarly() {
        if (confirm("End quiz now?")) showResults();
    }

    function showResults() {
        document.getElementById('quiz-screen').classList.remove('active');
        document.getElementById('quiz-header').style.display = 'none';
        document.getElementById('result-screen').classList.add('active');
        
        document.getElementById('final-score').innerText = `You got ${score} out of 30!`;
        
        let stars = "";
        const starCount = Math.ceil((score / 30) * 5);
        for(let i=0; i<starCount; i++) stars += "⭐";
        document.getElementById('star-display').innerText = stars;
        
        speak(`Great Job! You earned ${starCount} stars!`);
    }
</script>

</body>
</html>
